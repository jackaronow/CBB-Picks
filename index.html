async function demotePick(away,home){
  console.log('demotePick called:',away,home,'isAdmin:',isAdminUser);
  if(!isAdminUser||!DATA){console.log('Blocked: admin=',isAdminUser,'DATA=',!!DATA);return}

  console.log('Demote key:',key,'dateKey:',dateKey,'existing:',!!demotions[key]);

      if(confirm('Restore this pick to its original tier?')){
        await db.ref('demotions/'+dateKey+'/'+key).remove();
        console.log('Restored pick');
      }
    }else{
      if(confirm('Demote this pick to Free Play?')){
        await db.ref('demotions/'+dateKey+'/'+key).set({away,home,demoted:true,time:Date.now()});
        console.log('Demoted pick');
      }
    }
  }catch(e){console.error('Demote error:',e);alert('Error: '+e.message)}
}

function isDemoted(pk){
  const key=pk.away.toLowerCase().replace(/[^a-z]/g,'')+'_'+pk.home.toLowerCase().replace(/[^a-z]/g,'');
  return!!demotions[key];
}

function getEffectiveType(pk,originalType){
  if(isDemoted(pk))return'free';
  return originalType;
}

function getAllPicksWithDemotions(){
  if(!DATA)return[];
  // Get all original picks
  const origPod=DATA.play_of_the_day?{...DATA.play_of_the_day,_origType:'pod'}:null;
  const origPremium=(DATA.premium_picks||[]).map(p=>({...p,_origType:'premium'}));
  const origFree=(DATA.free_plays||[]).map(p=>({...p,_origType:'free'}));
  
  // Check demotions
  let all=[];
  if(origPod)all.push(origPod);
  all=all.concat(origPremium).concat(origFree);
  
  // Apply demotions
  let demotedList=all.filter(p=>isDemoted(p));
  let nonDemoted=all.filter(p=>!isDemoted(p));
  
  // Sort non-demoted by edge (highest first)
  nonDemoted.sort((a,b)=>(b.edge||0)-(a.edge||0));
  
  // Assign types: top 1 = pod, next 4 = premium, rest (edge>=4) = free
  let result=[];
  for(let i=0;i<nonDemoted.length;i++){
    const p=nonDemoted[i];
    if(i===0)result.push({...p,_type:'pod'});
    else if(i<5)result.push({...p,_type:'premium'});
    else result.push({...p,_type:'free'});
  }
  
  // Demoted picks become free plays
  for(const p of demotedList){
    result.push({...p,_type:'free',_demoted:true});
  }
  
  // Re-sort by edge
  result.sort((a,b)=>(b.edge||0)-(a.edge||0));
  
  return result;
}

// Override original functions to use demotion-aware versions
function getAllPicks(){
  if(!DATA)return[];
  if(Object.keys(demotions).length>0){

function getTailRef(pick){
  const dateKey=DATA?DATA.date.replace(/-/g,''):'';
  const gameKey=(pick.away+'_'+pick.home).replace(/[^a-zA-Z0-9]/g,'_');
  return db.ref('tails/'+dateKey+'/'+gameKey);
}

function loadTailCounts(){
  if(!DATA)return;
  const dateKey=DATA.date.replace(/-/g,'');
  db.ref('tails/'+dateKey).on('value',(snap)=>{
    const data=snap.val()||{};
    const prevCounts={...tailCounts};
    tailCounts={};
    for(const[gameKey,count]of Object.entries(data)){
      tailCounts[gameKey]=count;
    }
    document.querySelectorAll('[data-tail-key]').forEach(el=>{
      const k=el.getAttribute('data-tail-key');
      const c=tailCounts[k]||0;
      const prev=prevCounts[k]||0;
      el.textContent=c>0?c+' tailing 🔥':'';
      if(c>prev&&prev>=0){
        el.classList.remove('flash');
        void el.offsetWidth;
        el.classList.add('flash');
      }
    });
  });
}

function updateTailCount(pick,isTailing){
  const ref=getTailRef(pick);
  ref.transaction((current)=>{
    const val=current||0;
    return isTailing?val+1:Math.max(0,val-1);
  });
  // Track user who tailed
  if(currentUser&&userProfile){
    const dateKey=DATA?DATA.date.replace(/-/g,''):'';
    const gameKey=getTailKey(pick);
    const userRef=db.ref('tail_users/'+dateKey+'/'+gameKey+'/'+currentUser.uid);
    if(isTailing){
      userRef.set(userProfile.username);
    }else{
      userRef.remove();
    }
  }
}

function renderTailChips(){
  document.querySelectorAll('[data-tailers-key]').forEach(el=>{
    const key=el.getAttribute('data-tailers-key');
    const users=tailUsers[key]||{};
    const names=Object.values(users);
    if(!currentUser||names.length===0){
      el.innerHTML='';return;
    }
    const show=names.slice(0,5);
    const more=names.length>5?names.length-5:0;
    el.innerHTML=show.map(n=>`<span class="tailer-chip">${n}</span>`).join('')+(more?`<span class="tailer-chip">+${more} more</span>`:'');
  });
}

function getTailCountForPick(pick){

let myBets={};  // key -> bet object
let myBetsLoaded=false;

function getMyBetKey(away,home,date){

// Calculate result for a user bet based on THEIR spread
function calcMyBetResult(bet){
  // If already settled (stored result from when game ended)
  if(bet.settled)return bet.settled;
  
  const key=bet.away+'@'+bet.home;
  const ls=liveScores[key];
  if(!ls||ls.status!=='post')return null;
  const diff=ls.home_score-ls.away_score;
  const spread=parseFloat(bet.spread);
  if(isNaN(spread))return null;
  const betOnHome=bet.bet_team.toLowerCase()===bet.home.toLowerCase();
  const margin=betOnHome?(diff+spread):(-diff+spread);
  let result;
  if(margin>0)result='won';
  else if(margin<0)result='lost';
  else result='push';
  
  // Auto-settle: save result and final score so it persists after today
  if(currentUser&&!bet.settled){
    bet.settled=result;
    bet.final_score=ls.away_score+'-'+ls.home_score;
    const betKey=getMyBetKey(bet.away,bet.home,bet.date);
    myBets[betKey]=bet;
    firestore.collection('user_bets').doc(currentUser.uid).set(myBets).catch(e=>console.error('Auto-settle save error:',e));
  }
  
  return result;
}

function calcMyBetProfit(bet,result){
  const units=parseFloat(bet.units)||1;
  const odds=parseInt(bet.odds)||-110;
  if(result==='push')return 0;
  if(result==='lost')return -(units*100);
  // Won: calculate payout from odds
  if(odds>0)return units*(odds);
  return units*(100/Math.abs(odds))*100;
}

function checkGameStateChanges(){
  const allPicks=getAllPicks();
  for(const p of allPicks){
    const key=getGameKey(p);
    const ls=liveScores[key];
    if(!ls)continue;
    const prevState=prevGameStates[key];
    const currentState=ls.status;
    
    // Game just went final
    if(prevState&&prevState!=='post'&&currentState==='post'){
      const result=checkResult(p,ls);
      const isTailed=isFollowed(p);
      
      if(isTailed&&!notifiedGames[key+'_result']){
        notifiedGames[key+'_result']=true;
        if(result==='won'){
          showToast(`<strong>${p.bet}</strong> covered! 💰`,'✅','covered',8000);
        }else{
          showToast(`<strong>${p.bet}</strong> didn't cover`,'❌','missed',6000);
        }
      }
    }
    
    prevGameStates[key]=currentState;
  }
}

// ===== LIVE RECORD CALCULATION =====
function getStreaks(){
  if(!DATA)return{pod:0,overall:0,podTotal:'0-0',lastResults:[]};
  // POD streak from past_pods
  const pods=(DATA.past_pods||[]).slice().reverse();
  let podStreak=0;
  for(const p of pods){
    if(p.result==='won')podStreak++;else break;
  }
  // Overall streak from daily_history (most recent days)
  const days=(DATA.daily_history||[]).slice().reverse();
  let overallStreak=0,streakType='';
  for(const d of days){
    if(d.wins>0&&d.losses===0){
      if(streakType===''||streakType==='win'){streakType='win';overallStreak++}else break;
    }else if(d.wins>d.losses){
      if(streakType===''||streakType==='win'){streakType='win';overallStreak++}else break;
    }else break;
  }
  const podR=DATA.record.pod;
  return{pod:podStreak,overall:overallStreak,podTotal:podR.wins+'-'+podR.losses,podWins:podR.wins,podLosses:podR.losses};
}

  if(s.overall>=3)parts.push(`📈 ${s.overall} winning days straight`);
  if(parts.length===0)return'';

function getTodayRecordByType(){
  const allPicks=getAllPicks();
  let podW=0,podL=0,premW=0,premL=0,fpW=0,fpL=0;
  for(const p of allPicks){
    const res=checkResult(p,liveScores[getGameKey(p)]);
    if(!res)continue;
    const w=res==='won'?1:0,l=res==='lost'?1:0;
    if(p._type==='pod'){podW+=w;podL+=l;premW+=w;premL+=l}
    else if(p._type==='premium'){premW+=w;premL+=l}
    else if(p._type==='free'){fpW+=w;fpL+=l}
  }
  return{pod:{w:podW,l:podL},premium:{w:premW,l:premL},free:{w:fpW,l:fpL}};
}

function calcProfit(wins,losses,unit){
  const winAmount=unit*(100/110);

function getFilteredRecord(){
  if(!DATA)return{wins:0,losses:0};
  const r=DATA.record;
  const todayRec=getTodayRecord();
  const todayType=getTodayRecordByType();
  if(profitFilter==='all'){
    return{wins:r.ats_combined.wins+todayRec.wins,losses:r.ats_combined.losses+todayRec.losses};
  }
  if(profitFilter==='premium'){
    const tw=todayType.pod.w+todayType.premium.w,tl=todayType.pod.l+todayType.premium.l;
    return{wins:r.premium.wins+tw,losses:r.premium.losses+tl};
  }
  const thresh=parseInt(profitFilter);
  const split=(DATA.splits||[]).find(s=>s.threshold===thresh);
  if(split)return{wins:split.wins+todayRec.wins,losses:split.losses+todayRec.losses};
  return{wins:r.ats_combined.wins+todayRec.wins,losses:r.ats_combined.losses+todayRec.losses};
}

function teamsMatch(pickName,espnFull,espnShort,espnAbbr){
  // Hardcoded match table for teams that keep failing fuzzy matching
  const raw=pickName.toLowerCase(),eFull=(espnFull||'').toLowerCase(),eShort=(espnShort||'').toLowerCase(),eAbbr=(espnAbbr||'').toLowerCase();
  const hardMatches={
    'northwestern st.':['northwestern st','nw state','northwestern state','nwst','demons'],
    'ut rio grande valley':['utrgv','rio grande','ut rio grande','vaqueros','ut rio grande valley'],
    'texas a&m corpus chris':['texas a&m-corpus christi','corpus christi','tamucc','a&m-cc','islanders','texas a&m-cc'],
    'texas a&m corpus christi':['texas a&m-corpus christi','corpus christi','tamucc','a&m-cc','islanders','texas a&m-cc'],
    'north carolina central':['nc central','nccu','north carolina central','nc central eagles'],
    'maryland eastern shore':['md eastern shore','umes','maryland eastern shore','maryland-eastern shore'],
    'southeastern louisiana':['se louisiana','southeastern la','se louisiana lions'],
    'east texas a&m':['east texas a&m','etamu','texas a&m-commerce','a&m-commerce','etx a&m'],
    'stephen f. austin':['sfa','stephen f austin','stephen f. austin','lumberjacks sfa'],
    'incarnate word':['uiw','incarnate word','incarnate'],
    'houston christian':['hou christian','houston christian','hcu','huskies hcu'],
    'coppin st.':['coppin st','coppin state','coppin'],
    'south carolina st.':['sc state','south carolina st','south carolina state'],
    'norfolk st.':['norfolk st','norfolk state','norfolk'],
    'morgan st.':['morgan st','morgan state','morgan'],
    'delaware st.':['delaware st','delaware state','del state','del st']
  };
  for(const[pick,espnNames]of Object.entries(hardMatches)){
    if(raw.includes(pick)||pick.includes(raw)){
      for(const en of espnNames){
        if(eFull.includes(en)||eShort.includes(en)||eAbbr===en||en.includes(eShort.toLowerCase()))return true;
      }
    }
  }
  
  const pn=normalizeTeam(pickName),ef=normalizeTeam(espnFull),es=normalizeTeam(espnShort);
  const pa=(espnAbbr||'').toLowerCase();
  
  // Direct substring match
  if(pn&&ef&&(pn.includes(ef)||ef.includes(pn)))return true;
  if(pn&&es&&(pn.includes(es)||es.includes(pn)))return true;
  
  // Abbreviation match (e.g. "MD" matches "Maryland")
  if(pa&&pn){
    const pWords=pn.split(' ');
    const pAbbr=pWords.map(w=>w[0]).join('');
    if(pa===pAbbr||pa===pn.replace(/\s/g,''))return true;
  }
  
  // First significant word match (e.g. "Maryland" matches "Maryland Terrapins")
  const pFirst=pn.split(' ')[0];
  const eFirst=ef.split(' ')[0];
  const esFirst=es.split(' ')[0];
  if(pFirst&&pFirst.length>3&&(pFirst===eFirst||pFirst===esFirst))return true;
  if(eFirst&&eFirst.length>3&&eFirst===pFirst)return true;
  if(esFirst&&esFirst.length>3&&esFirst===pFirst)return true;
  
  // Check if pick name's mascot or school matches ESPN
  const pAlias=TEAM_ALIASES[pn]||'';
  if(pAlias&&(ef.includes(pAlias)||es.includes(pAlias)))return true;
  
  // Word overlap
  const pw=pn.split(' ').filter(w=>w.length>2),ew=ef.split(' ').filter(w=>w.length>2),esw=es.split(' ').filter(w=>w.length>2);
  if(pw.length&&ew.length&&pw.every(w=>ew.some(e=>e.includes(w)||w.includes(e))))return true;
  if(pw.length&&esw.length&&pw.every(w=>esw.some(e=>e.includes(w)||w.includes(e))))return true;
  if(ew.length&&pw.length&&ew.every(w=>pw.some(p=>p.includes(w)||w.includes(p))))return true;
  return false;
}

function buildAllGames(){
  allGamesData=[];
  for(const ev of espnGames){
    if(!ev.competitions||!ev.competitions[0])continue;
    const comp=ev.competitions[0],teams=comp.competitors||[];
    if(teams.length<2)continue;
    const home=teams.find(t=>t.homeAway==='home'),away=teams.find(t=>t.homeAway==='away');
    if(!home||!away)continue;
    const status=comp.status||{},state=status.type?status.type.state:'pre';
    const detail=status.type?status.type.shortDetail:'';
    let startTime='';let startDate=null;
    if(comp.date){const gd=new Date(comp.date);startTime=gd.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'});startDate=gd}
    const gd={
      away_name:away.team.shortDisplayName||away.team.displayName||'',
      home_name:home.team.shortDisplayName||home.team.displayName||'',
      away_full:away.team.displayName||'',home_full:home.team.displayName||'',
      away_abbr:away.team.abbreviation||'',home_abbr:home.team.abbreviation||'',
      away_score:parseInt(away.score)||0,home_score:parseInt(home.score)||0,
      status:state,detail,startTime,startDate,
      period:status.period||0,clock:status.displayClock||''
    };
    allGamesData.push(gd);
    if(state==='in')console.log('🏀 LIVE ESPN:',gd.away_full,'('+gd.away_name+'/'+gd.away_abbr+') @',gd.home_full,'('+gd.home_name+'/'+gd.home_abbr+')');
  }
  console.log('📊 ESPN total:',allGamesData.length,'games,',allGamesData.filter(g=>g.status==='in').length,'live');
}

function matchScores(){
  if(!DATA||!espnGames.length)return;
  const allPicks=getAllGamesWithPicks();
  let matched=0,unmatched=[];
  for(const pick of allPicks){
    const key=pick.away+'@'+pick.home;
    let found=false;
    for(const g of allGamesData){
      if(teamsMatch(pick.away,g.away_full,g.away_name,g.away_abbr)&&teamsMatch(pick.home,g.home_full,g.home_name,g.home_abbr)){
        liveScores[key]={away_score:g.away_score,home_score:g.home_score,period:g.period,clock:g.clock,status:g.status,detail:g.detail,startTime:g.startTime,started:g.status!=='pre'};
        found=true;matched++;break;
      }
    }
    if(!found)unmatched.push(pick.away+' @ '+pick.home);
  }
  if(unmatched.length)console.log('⚠️ Unmatched picks ('+unmatched.length+'):', unmatched);
  if(allGamesData.length)console.log('✅ Matched '+matched+'/'+allPicks.length+' picks to ESPN. ESPN has '+allGamesData.length+' games, '+allGamesData.filter(g=>g.status==='in').length+' live.');
}

function checkCovering(pick,ls){
  if(!ls||ls.status==='pre')return null;
  const m=pick.bet.match(/([+-]?\d+\.?\d*)\s*$/);if(!m)return null;
  const spread=parseFloat(m[1]),betOnHome=pick.bet.toLowerCase().includes(pick.home.toLowerCase());
  const diff=ls.home_score-ls.away_score;
  return betOnHome?(diff+spread)>0?'covering':'not_covering':(-diff+spread)>0?'covering':'not_covering';
}

    'SDSU':'San Diego State','SJSU':'San Jose State',

// Sort: live first, then by time, fallback confidence
function sortPicks(items){
  return[...items].sort((a,b)=>{
    const la=liveScores[getGameKey(a)],lb=liveScores[getGameKey(b)];
    const sa=la?(la.status==='in'?0:la.status==='pre'?1:2):1;
    const sb=lb?(lb.status==='in'?0:lb.status==='pre'?1:2):1;
    if(sa!==sb)return sa-sb;
    const ta=la&&la.startTime?new Date('2000/1/1 '+la.startTime).getTime():99999999;
    const tb=lb&&lb.startTime?new Date('2000/1/1 '+lb.startTime).getTime():99999999;
    if(ta!==tb)return ta-tb;
    return(b.confidence||0)-(a.confidence||0);
  });
}

function sortGames(items){
  return[...items].sort((a,b)=>{
    const sa=a.status==='in'?0:a.status==='pre'?1:2;
    const sb=b.status==='in'?0:b.status==='pre'?1:2;
    if(sa!==sb)return sa-sb;
    const ta=a.startDate?a.startDate.getTime():99999999;
    const tb=b.startDate?b.startDate.getTime():99999999;
    return ta-tb;
  });
}

function filterSearch(items,q,keys){
  if(!q)return items;
  const s=q.toLowerCase();
  return items.filter(i=>keys.some(k=>(i[k]||'').toLowerCase().includes(s)));
}

    gamesWithPicks.push({pick:p,espn:allGamesData.find(g=>teamsMatch(p.away,g.away_full,g.away_name,g.away_abbr)&&teamsMatch(p.home,g.home_full,g.home_name,g.home_abbr))||null});
  }
  // ESPN games without picks
  const plainGames=allGamesData.filter(g=>!findPickForGame(g));
  
  let filtered=gamesWithPicks.filter(g=>{
    if(!gamesSearch)return true;
    const s=gamesSearch.toLowerCase();
    return g.pick.away.toLowerCase().includes(s)||g.pick.home.toLowerCase().includes(s)||g.pick.pick.toLowerCase().includes(s);
  });
  filtered=filtered.sort((a,b)=>{
    const la=liveScores[getGameKey(a.pick)],lb=liveScores[getGameKey(b.pick)];
    const sa=la?(la.status==='in'?0:la.status==='pre'?1:2):1;
    const sb=lb?(lb.status==='in'?0:lb.status==='pre'?1:2):1;
    if(sa!==sb)return sa-sb;
    const ta=la&&la.startTime?new Date('2000/1/1 '+la.startTime).getTime():99999999;
    const tb=lb&&lb.startTime?new Date('2000/1/1 '+lb.startTime).getTime():99999999;
    if(ta!==tb)return ta-tb;
    return(b.pick.confidence||0)-(a.pick.confidence||0);
  });

  let filteredPlain=plainGames.filter(g=>{
    if(!gamesSearch)return true;
    const s=gamesSearch.toLowerCase();
    return g.away_name.toLowerCase().includes(s)||g.home_name.toLowerCase().includes(s)||g.away_full.toLowerCase().includes(s)||g.home_full.toLowerCase().includes(s);
  });
  filteredPlain=sortGames(filteredPlain);

  const pickCards=filtered.map(g=>pickCard(g.pick,g.pick._type||'free',true)).join('');
  const plainCards=filteredPlain.map(g=>plainGameCard(g)).join('');
  
  return`<div>${searchBox(gamesSearch,"gamesSearch")}<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:14px;font-weight:700;color:#eab308">Our Picks</span><span style="font-size:11px;color:rgba(255,255,255,.3);background:rgba(255,255,255,.04);padding:2px 8px;border-radius:8px">${filtered.length}</span></div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">${pickCards||'<div style="text-align:center;padding:20px;color:rgba(255,255,255,.3);font-size:13px">No matching picks</div>'}</div>${filteredPlain.length?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:14px;font-weight:700;color:rgba(255,255,255,.4)">Other Games</span><span style="font-size:11px;color:rgba(255,255,255,.3);background:rgba(255,255,255,.04);padding:2px 8px;border-radius:8px">${filteredPlain.length}</span></div><div style="display:flex;flex-direction:column;gap:8px">${plainCards}</div>`:''}</div>`;
}

olid rgba(34,197,94,.15);border-radius:12px;padding:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div style="font-size:11px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:1px;text-transform:uppercase">${userUnit!==100?'Your':'Total'} Profit ($${userUnit} @ -110)</div><button class="unit-btn" onclick="showUnitModal()" style="font-size:9px">💰 Change</button></div><div style="font-size:36px;font-weight:800;color:#22c55e;font-family:'JetBrains Mono',monospace;letter-spacing:-1px">$${getFilteredProfit().toLocaleString(undefined,{minimumFractionDigits:2})}</div><div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:4px">${getFilteredRecord().wins+getFilteredRecord().losses} bets · ${pct(getFilteredRecord().wins,getFilteredRecord().losses)}% win rate${userUnit!==100?' · Based on $'+userUnit+'/bet':''}</div>${userUnit!==100?'<div style="font-size:10px;color:rgba(255,255,255,.2);margin-top:6px;font-style:italic">Showing what your profit would be if you were tailing</div>':''}</div></div>`;

      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:12px"><div style="display:flex;flex-wrap:wrap;gap:8px">${pills}</div><button class="unit-btn" onclick="showUnitModal()">💰 $${userUnit}</button></div>
      <div style="padding-bottom:16px"><div style="font-size:10px;color:rgba(255,255,255,.25);font-style:italic">ℹ️ Only bets with a 4+ point edge are counted towards our record and profit.</div></div>
      <div style="display:flex;gap:2px;background:rgba(255,255,255,.03);border-radius:10px;padding:3px;margin-bottom:20px">${tabBtns}</div>
      <div class="fade-up">${content}</div>
      <div style="text-align:center;padding:20px 0 32px;border-top:1px solid rgba(255,255,255,.04)"><div style="font-size:11px;color:rgba(255,255,255,.2)">Model-generated picks · Not financial advice · Gamble responsibly</div></div>
    </div>`;
  }catch(e){console.error('Render error:',e);document.getElementById('app').innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div style="text-align:center;color:rgba(255,255,255,.5)"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:16px;font-weight:600">Error loading app</div><div style="font-size:12px;margin-top:8px;color:rgba(255,255,255,.3)">${e.message}</div></div></div>`}
}
