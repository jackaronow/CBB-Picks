<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBB Model Picks</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0f;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
    .fade-up{animation:fadeUp .5s ease both}
    .clickable{cursor:pointer;transition:transform .15s ease,box-shadow .15s ease}
    .clickable:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
    .clickable:active{transform:scale(.98)}
    input[type="text"],input[type="date"]{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff;font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
    input:focus{border-color:rgba(168,85,247,.4)}
  </style>
</head>
<body>
<div id="app"></div>
<script>
let DATA=null,activeTab='picks',edgeFilter=3,searchQuery='',currentPage='main',dateRange='7',customFrom='',customTo='';

async function loadData(){
  try{const r=await fetch('picks.json?'+Date.now());DATA=await r.json();render()}
  catch(e){document.getElementById('app').innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div style="text-align:center;color:rgba(255,255,255,.5)"><div style="font-size:48px;margin-bottom:16px">🏀</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">No picks available</div><div style="font-size:13px;color:rgba(255,255,255,.3)">Run the model to generate today's picks</div></div></div>`}
}

function p(w,l){return(w+l)>0?((w/(w+l))*100).toFixed(1):'0.0'}

function filterByDate(items,dk){
  if(dateRange==='all')return items;
  if(dateRange==='custom')return items.filter(i=>(!customFrom||i[dk]>=customFrom)&&(!customTo||i[dk]<=customTo));
  const d=parseInt(dateRange),c=new Date();c.setDate(c.getDate()-d);
  const cs=c.toISOString().split('T')[0];
  return items.filter(i=>i[dk]>=cs);
}

function dateBtns(){
  const bs=[{v:'7',l:'7 Days'},{v:'14',l:'14 Days'},{v:'30',l:'30 Days'},{v:'all',l:'All Time'},{v:'custom',l:'Custom'}].map(b=>{
    const a=dateRange===b.v;
    return `<button onclick="dateRange='${b.v}';render()" style="padding:6px 12px;border-radius:20px;cursor:pointer;background:${a?'rgba(234,179,8,.2)':'rgba(255,255,255,.04)'};color:${a?'#eab308':'rgba(255,255,255,.4)'};font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;border:1px solid ${a?'rgba(234,179,8,.4)':'rgba(255,255,255,.06)'}">${b.l}</button>`
  }).join('');
  const ci=dateRange==='custom'?`<div style="display:flex;gap:8px;margin-top:8px"><input type="date" value="${customFrom}" onchange="customFrom=this.value;render()" style="flex:1;color-scheme:dark"/><span style="color:rgba(255,255,255,.3);align-self:center">to</span><input type="date" value="${customTo}" onchange="customTo=this.value;render()" style="flex:1;color-scheme:dark"/></div>`:'';
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${bs}</div>${ci}`;
}

function backBtn(){
  return `<button onclick="currentPage='main';dateRange='7';render()" style="display:flex;align-items:center;gap:6px;background:none;border:none;color:rgba(255,255,255,.5);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;margin-bottom:16px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back to Picks</button>`;
}

function confBar(v){
  const pc=Math.round(v*100),c=pc>=75?'#22c55e':pc>=60?'#eab308':'#f97316';
  return `<div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden"><div style="width:${pc}%;height:100%;background:${c};border-radius:3px"></div></div><span style="font-size:12px;font-weight:600;color:${c};min-width:36px;text-align:right">${pc}%</span></div>`;
}

function pickCard(pk,type){
  const isPOD=type==='pod',ec=pk.edge>=6?'#22c55e':'#eab308',eb=pk.edge>=6?'rgba(34,197,94,.15)':'rgba(234,179,8,.15)',ebd=pk.edge>=6?'rgba(34,197,94,.3)':'rgba(234,179,8,.3)';
  return `<div style="background:${isPOD?'linear-gradient(135deg,rgba(234,179,8,.12),rgba(234,179,8,.04))':'rgba(255,255,255,.03)'};border:1px solid ${isPOD?'rgba(234,179,8,.3)':'rgba(255,255,255,.06)'};border-radius:12px;padding:16px 20px;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden">
    ${isPOD?`<div style="position:absolute;top:0;right:0;background:linear-gradient(135deg,#eab308,#f59e0b);color:#000;font-size:10px;font-weight:800;letter-spacing:1px;padding:4px 12px 4px 16px;border-radius:0 0 0 12px;text-transform:uppercase">🔥 PLAY OF THE DAY</div>`:''}
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div style="font-size:11px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">${pk.away} @ ${pk.home}</div><div style="font-size:18px;font-weight:700;color:#fff">${pk.bet}</div></div>
      <div style="background:${eb};border:1px solid ${ebd};border-radius:8px;padding:4px 10px;text-align:center"><div style="font-size:10px;color:rgba(255,255,255,.5);font-weight:600">EDGE</div><div style="font-size:16px;font-weight:800;color:${ec}">${pk.edge.toFixed(1)}</div></div>
    </div>
    <div style="display:flex;gap:16px;font-size:12px;color:rgba(255,255,255,.5)"><span>Pick: <span style="color:#fff;font-weight:600">${pk.pick}</span></span><span>Predicted Score: <span style="color:#fff;font-weight:600">${pk.pred_score}</span></span></div>
    ${confBar(pk.confidence)}
  </div>`;
}

function histCard(g){
  const w=g.result==='won',bc=w?'rgba(34,197,94,.3)':'rgba(239,68,68,.3)',bg=w?'rgba(34,197,94,.06)':'rgba(239,68,68,.06)';
  const badge=w?`<span style="font-size:10px;font-weight:800;color:#22c55e;background:rgba(34,197,94,.15);padding:3px 10px;border-radius:10px">✓ COVERED</span>`:`<span style="font-size:10px;font-weight:800;color:#ef4444;background:rgba(239,68,68,.15);padding:3px 10px;border-radius:10px">✗ MISSED</span>`;
  const edgeVal=typeof g.edge==='number'?g.edge.toFixed(1):g.edge;
  return `<div style="background:${bg};border:1px solid ${bc};border-radius:12px;padding:14px 18px;display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div style="font-size:10px;color:rgba(255,255,255,.3);font-weight:600;letter-spacing:1px;margin-bottom:2px">${g.date}</div><div style="font-size:11px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">${g.away} @ ${g.home}</div><div style="font-size:16px;font-weight:700;color:#fff">${g.bet}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">${badge}<div style="font-size:11px;color:rgba(255,255,255,.4)">Edge: <span style="font-weight:700;color:${g.edge>=6?'#22c55e':'#eab308'}">${edgeVal}</span></div></div>
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,.5)">Final Score: <span style="color:#fff;font-weight:600">${g.actual_score||'Pending'}</span></div>
  </div>`;
}

function profitPage(){
  const f=filterByDate(DATA.daily_history||[],'date'),mx=Math.max(...f.map(d=>Math.abs(d.profit)),1);
  const tp=f.reduce((s,d)=>s+d.profit,0),tw=f.reduce((s,d)=>s+d.wins,0),tl=f.reduce((s,d)=>s+d.losses,0);
  const bars=f.map(d=>{
    const ph=Math.max(Math.abs(d.profit)/mx*100,4),ip=d.profit>=0,c=ip?'#22c55e':'#ef4444',lb=d.date.slice(5);
    return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:36px;gap:4px"><div style="font-size:10px;font-weight:700;color:${c}">${ip?'+':''}$${Math.abs(d.profit).toFixed(0)}</div><div style="width:100%;max-width:40px;height:120px;display:flex;align-items:${ip?'flex-end':'flex-start'};justify-content:center"><div style="width:80%;height:${ph}%;background:${c};border-radius:4px;opacity:.8"></div></div><div style="font-size:9px;color:rgba(255,255,255,.3);font-weight:600">${lb}</div><div style="font-size:9px;color:rgba(255,255,255,.25)">${d.wins}-${d.losses}</div></div>`;
  }).join('');
  return `<div class="fade-up" style="padding-bottom:32px">${backBtn()}<h2 style="font-size:18px;font-weight:800;color:#22c55e;margin-bottom:4px">💰 Profit Tracker</h2><p style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px">$100 bets @ -110 odds · Edge ≥ 3</p>${dateBtns()}<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><div style="font-size:11px;color:rgba(255,255,255,.4);font-weight:600;text-transform:uppercase;letter-spacing:1px">Period Profit</div><div style="font-size:28px;font-weight:800;color:${tp>=0?'#22c55e':'#ef4444'};font-family:'JetBrains Mono',monospace">${tp>=0?'+':''}$${tp.toFixed(2)}</div></div><div style="text-align:right"><div style="font-size:11px;color:rgba(255,255,255,.4);font-weight:600;text-transform:uppercase;letter-spacing:1px">Record</div><div style="font-size:20px;font-weight:800;color:#fff">${tw}-${tl}</div></div></div><div style="display:flex;gap:2px;align-items:center;overflow-x:auto;padding:4px 0">${bars||'<div style="text-align:center;color:rgba(255,255,255,.3);font-size:13px;width:100%;padding:40px 0">No data for this period</div>'}</div></div></div>`;
}

function atsPage(){
  const f=filterByDate(DATA.daily_history||[],'date').slice().reverse();
  const tw=f.reduce((s,d)=>s+d.wins,0),tl=f.reduce((s,d)=>s+d.losses,0);
  const rows=f.map((d,i)=>`<div style="display:grid;grid-template-columns:1fr 70px 70px 80px;align-items:center;background:${i%2?'rgba(255,255,255,.02)':'transparent'};border-radius:6px;padding:2px 0"><div style="font-size:13px;font-weight:600;color:#fff;padding:10px 8px">${d.date}</div><div style="font-size:13px;font-weight:600;color:#22c55e;text-align:center">${d.wins}</div><div style="font-size:13px;font-weight:600;color:#ef4444;text-align:center">${d.losses}</div><div style="text-align:center"><span style="font-size:12px;font-weight:700;color:${d.pct>=.6?'#22c55e':d.pct>=.5?'#eab308':'#ef4444'};background:${d.pct>=.6?'rgba(34,197,94,.12)':d.pct>=.5?'rgba(234,179,8,.12)':'rgba(239,68,68,.12)'};padding:3px 10px;border-radius:10px">${(d.pct*100).toFixed(1)}%</span></div></div>`).join('');
  const hdrs=['Date','Wins','Losses','Win %'].map((h,i)=>`<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:uppercase;padding:8px ${i?'0':'8px'};text-align:${i?'center':'left'};border-bottom:1px solid rgba(255,255,255,.06)">${h}</div>`).join('');
  return `<div class="fade-up" style="padding-bottom:32px">${backBtn()}<h2 style="font-size:18px;font-weight:800;color:#22c55e;margin-bottom:4px">📊 Daily ATS Record</h2><p style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px">Edge ≥ 3 bets only</p>${dateBtns()}<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-size:20px;font-weight:800;color:#fff">${tw}-${tl}</div><span style="font-size:14px;font-weight:700;color:#22c55e;background:rgba(34,197,94,.12);padding:4px 12px;border-radius:10px">${p(tw,tl)}%</span></div><div style="display:grid;grid-template-columns:1fr 70px 70px 80px;margin-bottom:4px">${hdrs}</div>${rows||'<div style="text-align:center;color:rgba(255,255,255,.3);font-size:13px;padding:24px 0">No data</div>'}</div></div>`;
}

function histPage(type){
  const isPOD=type==='pod',items=isPOD?(DATA.past_pods||[]):(DATA.past_premiums||[]);
  const title=isPOD?'🔥 Play of the Day History':'⭐ Premium Picks History';
  const color=isPOD?'#f97316':'#eab308',r=isPOD?DATA.record.pod:DATA.record.premium;
  return `<div class="fade-up" style="padding-bottom:32px">${backBtn()}<h2 style="font-size:18px;font-weight:800;color:${color};margin-bottom:4px">${title}</h2><div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><span style="font-size:20px;font-weight:800;color:#fff">${r.wins}-${r.losses}</span><span style="font-size:14px;font-weight:700;color:${color};background:${color}20;padding:4px 12px;border-radius:10px">${(r.pct*100).toFixed(1)}%</span></div><div style="display:flex;flex-direction:column;gap:8px">${items.map(g=>histCard(g)).join('')||'<div style="text-align:center;color:rgba(255,255,255,.3);font-size:13px;padding:24px 0">No results yet</div>'}</div></div>`;
}

function render(){
  if(!DATA)return;const r=DATA.record;

  if(currentPage!=='main'){
    let c='';
    if(currentPage==='profit')c=profitPage();
    else if(currentPage==='ats')c=atsPage();
    else if(currentPage==='pod_history')c=histPage('pod');
    else if(currentPage==='premium_history')c=histPage('premium');
    document.getElementById('app').innerHTML=`<div style="background:linear-gradient(180deg,rgba(234,179,8,.08),transparent);border-bottom:1px solid rgba(255,255,255,.06);padding:24px 0 20px"><div style="max-width:640px;margin:0 auto;padding:0 20px"><div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#eab308,#f59e0b);display:flex;align-items:center;justify-content:center;font-size:16px">🏀</div><h1 style="font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#fff,rgba(255,255,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent">CBB Model Picks</h1></div></div></div><div style="max-width:640px;margin:0 auto;padding:20px">${c}</div>`;
    return;
  }

  const ff=DATA.free_plays.filter(q=>{if(q.edge<edgeFilter)return false;if(searchQuery){const s=searchQuery.toLowerCase();return q.away.toLowerCase().includes(s)||q.home.toLowerCase().includes(s)||q.pick.toLowerCase().includes(s)}return true});
  const fb=[3,4,5,6,7].map(v=>{const a=edgeFilter===v;return`<button onclick="edgeFilter=${v};render()" style="padding:6px 14px;border-radius:20px;cursor:pointer;background:${a?'rgba(168,85,247,.2)':'rgba(255,255,255,.04)'};color:${a?'#a855f7':'rgba(255,255,255,.4)'};font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;border:1px solid ${a?'rgba(168,85,247,.4)':'rgba(255,255,255,.06)'}">${v===3?'All':'≥ '+v}</button>`}).join('');
  const tb=(id,l)=>{const a=activeTab===id;return`<button onclick="activeTab='${id}';render()" style="flex:1;padding:10px 16px;border:none;border-radius:8px;background:${a?'rgba(234,179,8,.15)':'transparent'};color:${a?'#eab308':'rgba(255,255,255,.4)'};font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">${l}</button>`};

  const pills=[
    {l:'🔥 POD',w:r.pod.wins,lo:r.pod.losses,c:'#f97316',ck:"currentPage='pod_history';render()"},
    {l:'⭐ Premium',w:r.premium.wins,lo:r.premium.losses,c:'#eab308',ck:''},
    {l:'🎯 Free Plays',w:r.free_plays.wins,lo:r.free_plays.losses,c:'#a855f7',ck:''}
  ].map(s=>`<div ${s.ck?`onclick="${s.ck}" class="clickable"`:''}style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:6px 14px;display:flex;align-items:center;gap:6px;font-size:12px;${s.ck?'cursor:pointer':''}"><span style="color:rgba(255,255,255,.5)">${s.l}</span><span style="font-weight:700;color:${s.c}">${s.w}-${s.lo}</span><span style="color:rgba(255,255,255,.3)">(${p(s.w,s.lo)}%)</span></div>`).join('');

  let pc='';
  if(activeTab==='picks'){
    const pod=DATA.play_of_the_day?`<div style="margin-bottom:24px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="color:#f97316"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></span><h2 style="font-size:15px;font-weight:700;color:#f97316">Play of the Day</h2><div style="height:1px;flex:1;background:linear-gradient(90deg,rgba(249,115,22,.3),transparent)"></div></div>${pickCard(DATA.play_of_the_day,'pod')}</div>`:'';
    const prem=DATA.premium_picks.length?`<div style="margin-bottom:24px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="color:#eab308"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span><h2 style="font-size:15px;font-weight:700;color:#eab308">Premium Picks</h2><span style="font-size:11px;background:rgba(234,179,8,.15);color:#eab308;padding:2px 8px;border-radius:10px;font-weight:700">${DATA.premium_picks.length}</span><div style="height:1px;flex:1;background:linear-gradient(90deg,rgba(234,179,8,.3),transparent)"></div></div><div style="display:flex;flex-direction:column;gap:8px">${DATA.premium_picks.map(q=>pickCard(q,'premium')).join('')}</div></div>`:'';
    const free=`<div style="margin-bottom:32px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:16px">🎯</span><h2 style="font-size:15px;font-weight:700;color:#a855f7">Free Plays</h2><span style="font-size:11px;background:rgba(168,85,247,.15);color:#a855f7;padding:2px 8px;border-radius:10px;font-weight:700">${ff.length}</span><div style="height:1px;flex:1;background:linear-gradient(90deg,rgba(168,85,247,.3),transparent)"></div></div><div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">${fb}</div><div style="margin-bottom:12px"><input type="text" placeholder="Search teams..." value="${searchQuery}" oninput="searchQuery=this.value;render()"/></div><div style="display:flex;flex-direction:column;gap:8px">${ff.length?ff.map(q=>pickCard(q,'free')).join(''):`<div style="text-align:center;padding:24px 16px;color:rgba(255,255,255,.3);font-size:13px;background:rgba(255,255,255,.02);border-radius:12px;border:1px solid rgba(255,255,255,.04)">${searchQuery?'No matches for "'+searchQuery+'"':'No free plays at edge ≥ '+edgeFilter+' today'}</div>`}</div></div>`;
    pc=pod+prem+free;
  }

  let rc='';
  if(activeTab==='records'){
    const pr=[
      {l:'🔥 Play of the Day',w:r.pod.wins,lo:r.pod.losses,pc:r.pod.pct,c:'#f97316'},
      {l:'⭐ Premium Picks',w:r.premium.wins,lo:r.premium.losses,pc:r.premium.pct,c:'#eab308'},
      {l:'🎯 Free Plays',w:r.free_plays.wins,lo:r.free_plays.losses,pc:r.free_plays.pct,c:'#a855f7'},
      {l:'Combined ATS',w:r.ats_combined.wins,lo:r.ats_combined.losses,pc:r.ats_combined.pct,c:'#3b82f6'}
    ].map(row=>`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:13px;color:rgba(255,255,255,.7)">${row.l}</span><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:700;color:#fff">${row.w}-${row.lo}</span><span style="font-size:12px;font-weight:700;color:${row.c};background:${row.c}15;padding:2px 8px;border-radius:6px">${(row.pc*100).toFixed(1)}%</span></div></div><div style="height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden"><div style="width:${row.pc*100}%;height:100%;background:${row.c};border-radius:2px"></div></div></div>`).join('');
    const sp=(DATA.splits||[]).map((s,i)=>{const pc=s.pct>=.7?'#22c55e':s.pct>=.6?'#eab308':'#f97316',pb=s.pct>=.7?'rgba(34,197,94,.12)':s.pct>=.6?'rgba(234,179,8,.12)':'rgba(249,115,22,.12)';return`<div style="display:grid;grid-template-columns:1fr 70px 70px 80px;align-items:center;background:${i%2?'rgba(255,255,255,.02)':'transparent'};border-radius:6px"><div style="font-size:13px;font-weight:700;color:#fff;padding:10px 0">Edge ≥ ${s.threshold}</div><div style="font-size:13px;font-weight:600;color:#22c55e;text-align:center">${s.wins}</div><div style="font-size:13px;font-weight:600;color:#ef4444;text-align:center">${s.losses}</div><div style="text-align:center"><span style="font-size:12px;font-weight:700;color:${pc};background:${pb};padding:3px 10px;border-radius:10px">${(s.pct*100).toFixed(1)}%</span></div></div>`}).join('');
    const sh=['Threshold','Wins','Losses','Win %'].map((h,i)=>`<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:uppercase;padding:8px 0;text-align:${i?'center':'left'};border-bottom:1px solid rgba(255,255,255,.06)">${h}</div>`).join('');
    rc=`<div class="fade-up" style="padding-bottom:32px"><div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:16px;letter-spacing:.5px;text-transform:uppercase">Season Performance</h3><div style="display:flex;flex-direction:column;gap:14px">${pr}</div></div><div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:16px;letter-spacing:.5px;text-transform:uppercase">Record by Edge Threshold</h3><div style="display:grid;grid-template-columns:1fr 70px 70px 80px;margin-bottom:4px">${sh}</div>${sp}</div><div style="background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(34,197,94,.02));border:1px solid rgba(34,197,94,.15);border-radius:12px;padding:20px"><div style="font-size:11px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Total Profit (Edge ≥ 3, $100 bets @ -110)</div><div style="font-size:36px;font-weight:800;color:#22c55e;font-family:'JetBrains Mono',monospace;letter-spacing:-1px">$${r.profit.toLocaleString(undefined,{minimumFractionDigits:2})}</div><div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:4px">${r.total_bets} total bets · ${(r.ats_combined.pct*100).toFixed(1)}% ATS win rate</div></div></div>`;
  }

  document.getElementById('app').innerHTML=`
    <div style="background:linear-gradient(180deg,rgba(234,179,8,.08),transparent);border-bottom:1px solid rgba(255,255,255,.06);padding:24px 0 20px"><div style="max-width:640px;margin:0 auto;padding:0 20px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#eab308,#f59e0b);display:flex;align-items:center;justify-content:center;font-size:16px">🏀</div><h1 style="font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#fff,rgba(255,255,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent">CBB Model Picks</h1></div><div style="display:flex;align-items:center;gap:8px;margin-top:8px"><div style="width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s ease infinite"></div><span style="font-size:12px;color:rgba(255,255,255,.4)">Updated ${DATA.updated}</span></div></div></div>
    <div style="max-width:640px;margin:0 auto;padding:0 20px">
      <div class="fade-up" style="display:flex;gap:10px;padding:20px 0;overflow-x:auto">
        <div class="clickable" onclick="currentPage='ats';render()" style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px 20px;flex:1;min-width:140px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="color:#22c55e"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span><span style="font-size:11px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:1px;text-transform:uppercase">ATS Record</span></div><div style="font-size:24px;font-weight:800;color:#22c55e;letter-spacing:-.5px">${r.ats_combined.wins}-${r.ats_combined.losses}</div><div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:2px">${(r.ats_combined.pct*100).toFixed(1)}% win rate</div></div>
        <div class="clickable" onclick="currentPage='premium_history';render()" style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px 20px;flex:1;min-width:140px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="color:#eab308"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span><span style="font-size:11px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:1px;text-transform:uppercase">Premium</span></div><div style="font-size:24px;font-weight:800;color:#eab308;letter-spacing:-.5px">${r.premium.wins}-${r.premium.losses}</div><div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:2px">${(r.premium.pct*100).toFixed(1)}%</div></div>
        <div class="clickable" onclick="currentPage='profit';render()" style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px 20px;flex:1;min-width:140px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="color:#22c55e"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span><span style="font-size:11px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:1px;text-transform:uppercase">Profit</span></div><div style="font-size:24px;font-weight:800;color:#22c55e;letter-spacing:-.5px">$${r.profit.toLocaleString()}</div><div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:2px">${r.total_bets} bets @ $100</div></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;padding-bottom:20px">${pills}</div>
      <div style="display:flex;gap:2px;background:rgba(255,255,255,.03);border-radius:10px;padding:3px;margin-bottom:20px">${tb('picks',"Today's Picks")}${tb('records','Full Record')}</div>
      <div class="fade-up">${activeTab==='picks'?pc:rc}</div>
      <div style="text-align:center;padding:20px 0 32px;border-top:1px solid rgba(255,255,255,.04)"><div style="font-size:11px;color:rgba(255,255,255,.2)">Model-generated picks · Not financial advice · Gamble responsibly</div></div>
    </div>`;
}

loadData();
</script>
</body>
</html>
