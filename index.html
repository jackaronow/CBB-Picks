async function fetchESPNScores(){
  try{

    let r=await fetch(url);
    let d=await r.json();
    console.log('📡 ESPN response (groups=100):',d.events?d.events.length:0,'events');

      url=`https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${ds}&limit=300`;
      console.log('🔄 Retrying without groups filter:',url);
      r=await fetch(url);d=await r.json();

    }

    }
    espnGames=d.events||[];buildAllGames();matchScores();render();
  }catch(e){console.log('ESPN error:',e)}
}

function teamsMatch(pickName,espnFull,espnShort,espnAbbr){
  const pn=normalizeTeam(pickName),ef=normalizeTeam(espnFull),es=normalizeTeam(espnShort);
  const pa=(espnAbbr||'').toLowerCase();
  
  // Direct substring match
  if(pn&&ef&&(pn.includes(ef)||ef.includes(pn)))return true;
  if(pn&&es&&(pn.includes(es)||es.includes(pn)))return true;
  
  // Abbreviation match (e.g. "MD" matches "Maryland")
  if(pa&&pn){
    const pWords=pn.split(' ');
    const pAbbr=pWords.map(w=>w[0]).join('');
    if(pa===pAbbr||pa===pn.replace(/\s/g,''))return true;
  }
  
  // First significant word match (e.g. "Maryland" matches "Maryland Terrapins")
  const pFirst=pn.split(' ')[0];
  const eFirst=ef.split(' ')[0];
  const esFirst=es.split(' ')[0];
  if(pFirst&&pFirst.length>3&&(pFirst===eFirst||pFirst===esFirst))return true;
  if(eFirst&&eFirst.length>3&&eFirst===pFirst)return true;
  if(esFirst&&esFirst.length>3&&esFirst===pFirst)return true;
  
  // Check if pick name's mascot or school matches ESPN
  const pAlias=TEAM_ALIASES[pn]||'';
  if(pAlias&&(ef.includes(pAlias)||es.includes(pAlias)))return true;
  
  // Word overlap
  const pw=pn.split(' ').filter(w=>w.length>2),ew=ef.split(' ').filter(w=>w.length>2),esw=es.split(' ').filter(w=>w.length>2);
  if(pw.length&&ew.length&&pw.every(w=>ew.some(e=>e.includes(w)||w.includes(e))))return true;
  if(pw.length&&esw.length&&pw.every(w=>esw.some(e=>e.includes(w)||w.includes(e))))return true;
  if(ew.length&&pw.length&&ew.every(w=>pw.some(p=>p.includes(w)||w.includes(p))))return true;
  return false;
}

function buildAllGames(){
  allGamesData=[];
  for(const ev of espnGames){
    if(!ev.competitions||!ev.competitions[0])continue;
    const comp=ev.competitions[0],teams=comp.competitors||[];
    if(teams.length<2)continue;
    const home=teams.find(t=>t.homeAway==='home'),away=teams.find(t=>t.homeAway==='away');
    if(!home||!away)continue;
    const status=comp.status||{},state=status.type?status.type.state:'pre';
    const detail=status.type?status.type.shortDetail:'';
    let startTime='';let startDate=null;
    if(comp.date){const gd=new Date(comp.date);startTime=gd.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'});startDate=gd}
    const gd={
      away_name:away.team.shortDisplayName||away.team.displayName||'',
      home_name:home.team.shortDisplayName||home.team.displayName||'',
      away_full:away.team.displayName||'',home_full:home.team.displayName||'',
      away_abbr:away.team.abbreviation||'',home_abbr:home.team.abbreviation||'',
      away_score:parseInt(away.score)||0,home_score:parseInt(home.score)||0,
      status:state,detail,startTime,startDate,
      period:status.period||0,clock:status.displayClock||''
    };
    allGamesData.push(gd);
    if(state==='in')console.log('🏀 LIVE ESPN:',gd.away_full,'('+gd.away_name+'/'+gd.away_abbr+') @',gd.home_full,'('+gd.home_name+'/'+gd.home_abbr+')');
  }
  console.log('📊 ESPN total:',allGamesData.length,'games,',allGamesData.filter(g=>g.status==='in').length,'live');
}

function matchScores(){
  if(!DATA||!espnGames.length)return;
  const allPicks=getAllGamesWithPicks();
  let matched=0,unmatched=[];
  for(const pick of allPicks){
    const key=pick.away+'@'+pick.home;
    let found=false;
    for(const g of allGamesData){
      if(teamsMatch(pick.away,g.away_full,g.away_name,g.away_abbr)&&teamsMatch(pick.home,g.home_full,g.home_name,g.home_abbr)){
        liveScores[key]={away_score:g.away_score,home_score:g.home_score,period:g.period,clock:g.clock,status:g.status,detail:g.detail,startTime:g.startTime,started:g.status!=='pre'};
        found=true;matched++;break;
      }
    }
    if(!found)unmatched.push(pick.away+' @ '+pick.home);
  }
  if(unmatched.length)console.log('⚠️ Unmatched picks ('+unmatched.length+'):', unmatched);
  if(allGamesData.length)console.log('✅ Matched '+matched+'/'+allPicks.length+' picks to ESPN. ESPN has '+allGamesData.length+' games, '+allGamesData.filter(g=>g.status==='in').length+' live.');
}

function startScoreUpdates(){fetchESPNScores();if(scoreInterval)clearInterval(scoreInterval);scoreInterval=setInterval(fetchESPNScores,30000)}
function getGameKey(p){return p.away+'@'+p.home}
function isFollowed(p){return followed[getGameKey(p)]||false}
function toggleFollow(p){const k=getGameKey(p);if(followed[k])delete followed[k];else followed[k]=true;saveFollowed();render()}
function getFollowedCount(){return Object.keys(followed).length}
function getAllPicks(){if(!DATA)return[];return[...(DATA.play_of_the_day?[{...DATA.play_of_the_day,_type:'pod'}]:[]),...(DATA.premium_picks||[]).map(p=>({...p,_type:'premium'})),...(DATA.free_plays||[]).map(p=>({...p,_type:'free'}))]}
function getAllGamesWithPicks(){if(!DATA)return[];return[...getAllPicks(),...(DATA.all_games||[]).map(p=>({...p,_type:'other'}))]}function getFollowedPicks(){return getAllPicks().filter(p=>isFollowed(p))}
function getLivePicks(){return getAllPicks().filter(p=>{const ls=liveScores[getGameKey(p)];return ls&&ls.status==='in'})}

function checkCovering(pick,ls){
  if(!ls||ls.status==='pre')return null;
  const m=pick.bet.match(/([+-]?\d+\.?\d*)\s*$/);if(!m)return null;
  const spread=parseFloat(m[1]),betOnHome=pick.bet.toLowerCase().includes(pick.home.toLowerCase());
  const diff=ls.home_score-ls.away_score;
  return betOnHome?(diff+spread)>0?'covering':'not_covering':(-diff+spread)>0?'covering':'not_covering';
}
function checkResult(p,ls){if(!ls||ls.status!=='post')return null;return checkCovering(p,ls)==='covering'?'won':'lost'}
function getTodayRecord(){const all=getAllPicks();let w=0,l=0;for(const p of all){const res=checkResult(p,liveScores[getGameKey(p)]);if(res==='won')w++;if(res==='lost')l++}return{wins:w,losses:l}}

// Find model pick for an ESPN game (including sub-3 edge)
function findPickForGame(g){
  const all=getAllGamesWithPicks();
  for(const p of all){if(teamsMatch(p.away,g.away_full,g.away_name,g.away_abbr)&&teamsMatch(p.home,g.home_full,g.home_name,g.home_abbr))return p}
  return null;
}

function cleanForFD(name){
  // Remove periods (St. → St)
  let n=name.replace(/\./g,'');
  // Common mappings that differ between model and FanDuel
  const map={
    'UConn':'Connecticut','UCONN':'Connecticut',
    'UNC':'North Carolina','SMU':'Southern Methodist',
    'USC':'Southern California','UCF':'Central Florida',
    'UNLV':'Nevada Las Vegas','VCU':'Virginia Commonwealth',
    'LSU':'Louisiana State','TCU':'Texas Christian',
    'BYU':'Brigham Young','UTEP':'Texas El Paso',
    'UVA':'Virginia','UK':'Kentucky',
    'Ole Miss':'Mississippi','Pitt':'Pittsburgh',
    'Cuse':'Syracuse','Nova':'Villanova',
    'SDSU':'San Diego State','SJSU':'San Jose State',
    'NIU':'Northern Illinois','EMU':'Eastern Michigan',
    'WMU':'Western Michigan','CMU':'Central Michigan',
    'FIU':'Florida International','FAU':'Florida Atlantic',
    'MTSU':'Middle Tennessee','UTSA':'Texas San Antonio',
    'UAB':'Alabama Birmingham','UNT':'North Texas',
    'App St':'Appalachian State','Ga Tech':'Georgia Tech',
    'Miami FL':'Miami Florida','Miami OH':'Miami Ohio'
  };
  for(const[k,v]of Object.entries(map)){if(n.toLowerCase()===k.toLowerCase()){n=v;break}}
  // Expand "St " to "Saint " as FanDuel sometimes uses full
  // But keep both options — just use the cleaned version
  return n;
}
function fdLink(pick){
  const team=encodeURIComponent(cleanForFD(pick.pick));

// Sort: live first, then by time, fallback confidence
function sortPicks(items){
  return[...items].sort((a,b)=>{
    const la=liveScores[getGameKey(a)],lb=liveScores[getGameKey(b)];
    const sa=la?(la.status==='in'?0:la.status==='pre'?1:2):1;
    const sb=lb?(lb.status==='in'?0:lb.status==='pre'?1:2):1;
    if(sa!==sb)return sa-sb;
    const ta=la&&la.startTime?new Date('2000/1/1 '+la.startTime).getTime():99999999;
    const tb=lb&&lb.startTime?new Date('2000/1/1 '+lb.startTime).getTime():99999999;
    if(ta!==tb)return ta-tb;
    return(b.confidence||0)-(a.confidence||0);
  });
}

function sortGames(items){
  return[...items].sort((a,b)=>{
    const sa=a.status==='in'?0:a.status==='pre'?1:2;
    const sb=b.status==='in'?0:b.status==='pre'?1:2;
    if(sa!==sb)return sa-sb;
    const ta=a.startDate?a.startDate.getTime():99999999;
    const tb=b.startDate?b.startDate.getTime():99999999;
    return ta-tb;
  });
}

function filterSearch(items,q,keys){
  if(!q)return items;
  const s=q.toLowerCase();
  return items.filter(i=>keys.some(k=>(i[k]||'').toLowerCase().includes(s)));
}

function renderTodaysGames(){
  const gamesWithPicks=[];
  const allPicks=getAllGamesWithPicks();
  // All model picks become game entries
  for(const p of allPicks){
    gamesWithPicks.push({pick:p,espn:allGamesData.find(g=>teamsMatch(p.away,g.away_full,g.away_name,g.away_abbr)&&teamsMatch(p.home,g.home_full,g.home_name,g.home_abbr))||null});
  }
  // ESPN games without picks
  const plainGames=allGamesData.filter(g=>!findPickForGame(g));
  
  let filtered=gamesWithPicks.filter(g=>{
    if(!gamesSearch)return true;
    const s=gamesSearch.toLowerCase();
    return g.pick.away.toLowerCase().includes(s)||g.pick.home.toLowerCase().includes(s)||g.pick.pick.toLowerCase().includes(s);
  });
  filtered=filtered.sort((a,b)=>{
    const la=liveScores[getGameKey(a.pick)],lb=liveScores[getGameKey(b.pick)];
    const sa=la?(la.status==='in'?0:la.status==='pre'?1:2):1;
    const sb=lb?(lb.status==='in'?0:lb.status==='pre'?1:2):1;
    if(sa!==sb)return sa-sb;
    const ta=la&&la.startTime?new Date('2000/1/1 '+la.startTime).getTime():99999999;
    const tb=lb&&lb.startTime?new Date('2000/1/1 '+lb.startTime).getTime():99999999;
    if(ta!==tb)return ta-tb;
    return(b.pick.confidence||0)-(a.pick.confidence||0);
  });

  let filteredPlain=plainGames.filter(g=>{
    if(!gamesSearch)return true;
    const s=gamesSearch.toLowerCase();
    return g.away_name.toLowerCase().includes(s)||g.home_name.toLowerCase().includes(s)||g.away_full.toLowerCase().includes(s)||g.home_full.toLowerCase().includes(s);
  });
  filteredPlain=sortGames(filteredPlain);

  const pickCards=filtered.map(g=>pickCard(g.pick,g.pick._type||'free',true)).join('');
  const plainCards=filteredPlain.map(g=>plainGameCard(g)).join('');
  
  return`<div>${searchBox(gamesSearch,"gamesSearch")}<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:14px;font-weight:700;color:#eab308">Our Picks</span><span style="font-size:11px;color:rgba(255,255,255,.3);background:rgba(255,255,255,.04);padding:2px 8px;border-radius:8px">${filtered.length}</span></div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">${pickCards||'<div style="text-align:center;padding:20px;color:rgba(255,255,255,.3);font-size:13px">No matching picks</div>'}</div>${filteredPlain.length?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:14px;font-weight:700;color:rgba(255,255,255,.4)">Other Games</span><span style="font-size:11px;color:rgba(255,255,255,.3);background:rgba(255,255,255,.04);padding:2px 8px;border-radius:8px">${filteredPlain.length}</span></div><div style="display:flex;flex-direction:column;gap:8px">${plainCards}</div>`:''}</div>`;
}

  const search=searchBox(liveSearch,"liveSearch");

    if(!lp.length)return`${subTabs}${search}<div style="text-align:center;padding:40px 16px;color:rgba(255,255,255,.3)"><div style="font-size:32px;margin-bottom:12px">📺</div><div style="font-size:14px;font-weight:600">No picks live right now</div></div>`;

  }

  // All live games
  let liveGames=allGamesData.filter(g=>g.status==='in');

  let fW=0,fL=0;for(const q of fp){const res=checkResult(q,liveScores[getGameKey(q)]);if(res==='won')fW++;if(res==='lost')fL++}
  const fTotal=fW+fL;
