<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBB Model Picks</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-up { animation: fadeUp 0.5s ease both; }
    .fade-up-1 { animation: fadeUp 0.5s ease 0.1s both; }
    .fade-up-2 { animation: fadeUp 0.5s ease 0.2s both; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // Load picks.json and render the app
    let DATA = null;
    let activeTab = 'picks';
    let edgeFilter = 3;

    async function loadData() {
      try {
        const resp = await fetch('picks.json?' + Date.now());
        DATA = await resp.json();
        render();
      } catch (e) {
        document.getElementById('app').innerHTML = `
          <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif">
            <div style="text-align:center;color:rgba(255,255,255,0.5)">
              <div style="font-size:48px;margin-bottom:16px">🏀</div>
              <div style="font-size:16px;font-weight:600;margin-bottom:8px">No picks available</div>
              <div style="font-size:13px;color:rgba(255,255,255,0.3)">Run the model to generate today's picks</div>
            </div>
          </div>`;
      }
    }

    function pct(w, l) { return (w + l) > 0 ? ((w / (w + l)) * 100).toFixed(1) : '0.0'; }

    function confBar(val) {
      const p = Math.round(val * 100);
      const c = p >= 75 ? '#22c55e' : p >= 60 ? '#eab308' : '#f97316';
      return `<div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden">
          <div style="width:${p}%;height:100%;background:${c};border-radius:3px;transition:width 0.6s ease"></div>
        </div>
        <span style="font-size:12px;font-weight:600;color:${c};min-width:36px;text-align:right">${p}%</span>
      </div>`;
    }

    function pickCard(pick, type) {
      const isPOD = type === 'pod';
      const edgeColor = pick.edge >= 6 ? '#22c55e' : '#eab308';
      const edgeBg = pick.edge >= 6 ? 'rgba(34,197,94,0.15)' : 'rgba(234,179,8,0.15)';
      const edgeBorder = pick.edge >= 6 ? 'rgba(34,197,94,0.3)' : 'rgba(234,179,8,0.3)';
      return `<div style="background:${isPOD ? 'linear-gradient(135deg,rgba(234,179,8,0.12),rgba(234,179,8,0.04))' : 'rgba(255,255,255,0.03)'};border:1px solid ${isPOD ? 'rgba(234,179,8,0.3)' : 'rgba(255,255,255,0.06)'};border-radius:12px;padding:16px 20px;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden">
        ${isPOD ? `<div style="position:absolute;top:0;right:0;background:linear-gradient(135deg,#eab308,#f59e0b);color:#000;font-size:10px;font-weight:800;letter-spacing:1px;padding:4px 12px 4px 16px;border-radius:0 0 0 12px;text-transform:uppercase">🔥 PLAY OF THE DAY</div>` : ''}
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:11px;color:rgba(255,255,255,0.4);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">${pick.away} @ ${pick.home}</div>
            <div style="font-size:18px;font-weight:700;color:#fff">${pick.bet}</div>
          </div>
          <div style="background:${edgeBg};border:1px solid ${edgeBorder};border-radius:8px;padding:4px 10px;text-align:center">
            <div style="font-size:10px;color:rgba(255,255,255,0.5);font-weight:600">EDGE</div>
            <div style="font-size:16px;font-weight:800;color:${edgeColor}">${pick.edge.toFixed(1)}</div>
          </div>
        </div>
        <div style="display:flex;gap:16px;font-size:12px;color:rgba(255,255,255,0.5)">
          <span>Pick: <span style="color:#fff;font-weight:600">${pick.pick}</span></span>
          <span>Score: <span style="color:#fff;font-weight:600">${pick.pred_score}</span></span>
        </div>
        ${confBar(pick.confidence)}
      </div>`;
    }

    function render() {
      const r = DATA.record;
      const filteredFree = DATA.free_plays.filter(p => p.edge >= edgeFilter);

      const filterBtns = [3,4,5,6,7].map(v => {
        const active = edgeFilter === v;
        return `<button onclick="edgeFilter=${v};render()" style="padding:6px 14px;border-radius:20px;cursor:pointer;background:${active ? 'rgba(168,85,247,0.2)' : 'rgba(255,255,255,0.04)'};color:${active ? '#a855f7' : 'rgba(255,255,255,0.4)'};font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;border:1px solid ${active ? 'rgba(168,85,247,0.4)' : 'rgba(255,255,255,0.06)'};transition:all 0.2s ease">${v === 3 ? 'All' : '≥ ' + v}</button>`;
      }).join('');

      const tabBtn = (id, label) => {
        const active = activeTab === id;
        return `<button onclick="activeTab='${id}';render()" style="flex:1;padding:10px 16px;border:none;border-radius:8px;background:${active ? 'rgba(234,179,8,0.15)' : 'transparent'};color:${active ? '#eab308' : 'rgba(255,255,255,0.4)'};font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s ease">${label}</button>`;
      };

      const pills = [
        { label: '🔥 POD', w: r.pod.wins, l: r.pod.losses, color: '#f97316' },
        { label: '⭐ Premium', w: r.premium.wins, l: r.premium.losses, color: '#eab308' },
        { label: '🎯 Free Plays', w: r.free_plays.wins, l: r.free_plays.losses, color: '#a855f7' },
      ].map(s => `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:6px 14px;display:flex;align-items:center;gap:6px;font-size:12px">
        <span style="color:rgba(255,255,255,0.5)">${s.label}</span>
        <span style="font-weight:700;color:${s.color}">${s.w}-${s.l}</span>
        <span style="color:rgba(255,255,255,0.3)">(${pct(s.w, s.l)}%)</span>
      </div>`).join('');

      // Picks tab content
      let picksContent = '';
      if (activeTab === 'picks') {
        const podSection = DATA.play_of_the_day ? `
          <div style="margin-bottom:24px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
              <span style="color:#f97316"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></span>
              <h2 style="font-size:15px;font-weight:700;color:#f97316;letter-spacing:-0.3px">Play of the Day</h2>
              <div style="height:1px;flex:1;background:linear-gradient(90deg,rgba(249,115,22,0.3),transparent)"></div>
            </div>
            ${pickCard(DATA.play_of_the_day, 'pod')}
          </div>` : '';

        const premSection = DATA.premium_picks.length > 0 ? `
          <div style="margin-bottom:24px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
              <span style="color:#eab308"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span>
              <h2 style="font-size:15px;font-weight:700;color:#eab308;letter-spacing:-0.3px">Premium Picks</h2>
              <span style="font-size:11px;background:rgba(234,179,8,0.15);color:#eab308;padding:2px 8px;border-radius:10px;font-weight:700">${DATA.premium_picks.length}</span>
              <div style="height:1px;flex:1;background:linear-gradient(90deg,rgba(234,179,8,0.3),transparent)"></div>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px">
              ${DATA.premium_picks.map(p => pickCard(p, 'premium')).join('')}
            </div>
          </div>` : '';

        const freeSection = `
          <div style="margin-bottom:32px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
              <span style="font-size:16px">🎯</span>
              <h2 style="font-size:15px;font-weight:700;color:#a855f7;letter-spacing:-0.3px">Free Plays</h2>
              <span style="font-size:11px;background:rgba(168,85,247,0.15);color:#a855f7;padding:2px 8px;border-radius:10px;font-weight:700">${filteredFree.length}</span>
              <div style="height:1px;flex:1;background:linear-gradient(90deg,rgba(168,85,247,0.3),transparent)"></div>
            </div>
            <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">${filterBtns}</div>
            <div style="display:flex;flex-direction:column;gap:8px">
              ${filteredFree.length > 0 ? filteredFree.map(p => pickCard(p, 'free')).join('') :
              `<div style="text-align:center;padding:24px 16px;color:rgba(255,255,255,0.3);font-size:13px;background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid rgba(255,255,255,0.04)">No free plays at edge ≥ ${edgeFilter} today</div>`}
            </div>
          </div>`;

        picksContent = podSection + premSection + freeSection;
      }

      // Records tab content
      let recordsContent = '';
      if (activeTab === 'records') {
        const perfRows = [
          { label: '🔥 Play of the Day', w: r.pod.wins, l: r.pod.losses, p: r.pod.pct, color: '#f97316' },
          { label: '⭐ Premium Picks', w: r.premium.wins, l: r.premium.losses, p: r.premium.pct, color: '#eab308' },
          { label: '🎯 Free Plays', w: r.free_plays.wins, l: r.free_plays.losses, p: r.free_plays.pct, color: '#a855f7' },
          { label: 'Combined ATS', w: r.ats_combined.wins, l: r.ats_combined.losses, p: r.ats_combined.pct, color: '#3b82f6' },
        ].map(row => `<div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span style="font-size:13px;color:rgba(255,255,255,0.7)">${row.label}</span>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:14px;font-weight:700;color:#fff">${row.w}-${row.l}</span>
              <span style="font-size:12px;font-weight:700;color:${row.color};background:${row.color}15;padding:2px 8px;border-radius:6px">${(row.p * 100).toFixed(1)}%</span>
            </div>
          </div>
          <div style="height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden">
            <div style="width:${row.p * 100}%;height:100%;background:${row.color};border-radius:2px"></div>
          </div>
        </div>`).join('');

        const splitsRows = DATA.splits.map((s, i) => {
          const pctColor = s.pct >= 0.7 ? '#22c55e' : s.pct >= 0.6 ? '#eab308' : '#f97316';
          const pctBg = s.pct >= 0.7 ? 'rgba(34,197,94,0.12)' : s.pct >= 0.6 ? 'rgba(234,179,8,0.12)' : 'rgba(249,115,22,0.12)';
          return `<div style="display:grid;grid-template-columns:1fr 70px 70px 80px;align-items:center;background:${i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.02)'};border-radius:6px">
            <div style="font-size:13px;font-weight:700;color:#fff;padding:10px 0">Edge ≥ ${s.threshold}</div>
            <div style="font-size:13px;font-weight:600;color:#22c55e;text-align:center;padding:10px 0">${s.wins}</div>
            <div style="font-size:13px;font-weight:600;color:#ef4444;text-align:center;padding:10px 0">${s.losses}</div>
            <div style="text-align:center;padding:10px 0"><span style="font-size:12px;font-weight:700;color:${pctColor};background:${pctBg};padding:3px 10px;border-radius:10px">${(s.pct * 100).toFixed(1)}%</span></div>
          </div>`;
        }).join('');

        recordsContent = `<div style="animation:fadeUp 0.4s ease;padding-bottom:32px">
          <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px;margin-bottom:16px">
            <h3 style="font-size:14px;font-weight:700;color:rgba(255,255,255,0.5);margin-bottom:16px;letter-spacing:0.5px;text-transform:uppercase">Season Performance</h3>
            <div style="display:flex;flex-direction:column;gap:14px">${perfRows}</div>
          </div>
          <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px;margin-bottom:16px">
            <h3 style="font-size:14px;font-weight:700;color:rgba(255,255,255,0.5);margin-bottom:16px;letter-spacing:0.5px;text-transform:uppercase">Record by Edge Threshold</h3>
            <div style="display:grid;grid-template-columns:1fr 70px 70px 80px;margin-bottom:4px">
              ${['Threshold','Wins','Losses','Win %'].map((h,i) => `<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase;padding:8px 0;text-align:${i===0?'left':'center'};border-bottom:1px solid rgba(255,255,255,0.06)">${h}</div>`).join('')}
            </div>
            ${splitsRows}
          </div>
          <div style="background:linear-gradient(135deg,rgba(34,197,94,0.08),rgba(34,197,94,0.02));border:1px solid rgba(34,197,94,0.15);border-radius:12px;padding:20px">
            <div style="font-size:11px;color:rgba(255,255,255,0.4);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Total Profit (Edge ≥ 3, $100 bets @ -110)</div>
            <div style="font-size:36px;font-weight:800;color:#22c55e;font-family:'JetBrains Mono',monospace;letter-spacing:-1px">$${r.profit.toLocaleString(undefined,{minimumFractionDigits:2})}</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px">${r.total_bets} total bets · ${(r.ats_combined.pct*100).toFixed(1)}% ATS win rate</div>
          </div>
        </div>`;
      }

      document.getElementById('app').innerHTML = `
        <!-- Header -->
        <div style="background:linear-gradient(180deg,rgba(234,179,8,0.08),transparent);border-bottom:1px solid rgba(255,255,255,0.06);padding:24px 0 20px">
          <div style="max-width:640px;margin:0 auto;padding:0 20px">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
              <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#eab308,#f59e0b);display:flex;align-items:center;justify-content:center;font-size:16px">🏀</div>
              <h1 style="font-size:20px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent">CBB Model Picks</h1>
            </div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
              <div style="width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s ease infinite"></div>
              <span style="font-size:12px;color:rgba(255,255,255,0.4)">Updated ${DATA.updated}</span>
            </div>
          </div>
        </div>
        <div style="max-width:640px;margin:0 auto;padding:0 20px">
          <!-- Stats -->
          <div class="fade-up" style="display:flex;gap:10px;padding:20px 0;overflow-x:auto">
            <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px 20px;flex:1;min-width:140px">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="color:#22c55e"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span><span style="font-size:11px;color:rgba(255,255,255,0.4);font-weight:600;letter-spacing:1px;text-transform:uppercase">ATS Record</span></div>
              <div style="font-size:24px;font-weight:800;color:#22c55e;letter-spacing:-0.5px">${r.ats_combined.wins}-${r.ats_combined.losses}</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px">${(r.ats_combined.pct*100).toFixed(1)}% win rate</div>
            </div>
            <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px 20px;flex:1;min-width:140px">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="color:#eab308"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span><span style="font-size:11px;color:rgba(255,255,255,0.4);font-weight:600;letter-spacing:1px;text-transform:uppercase">Premium</span></div>
              <div style="font-size:24px;font-weight:800;color:#eab308;letter-spacing:-0.5px">${r.premium.wins}-${r.premium.losses}</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px">${(r.premium.pct*100).toFixed(1)}%</div>
            </div>
            <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px 20px;flex:1;min-width:140px">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="color:#22c55e"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span><span style="font-size:11px;color:rgba(255,255,255,0.4);font-weight:600;letter-spacing:1px;text-transform:uppercase">Profit</span></div>
              <div style="font-size:24px;font-weight:800;color:#22c55e;letter-spacing:-0.5px">$${r.profit.toLocaleString()}</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px">${r.total_bets} bets @ $100</div>
            </div>
          </div>
          <!-- Pills -->
          <div class="fade-up-1" style="display:flex;flex-wrap:wrap;gap:8px;padding-bottom:20px">${pills}</div>
          <!-- Tabs -->
          <div class="fade-up-2" style="display:flex;gap:2px;background:rgba(255,255,255,0.03);border-radius:10px;padding:3px;margin-bottom:20px">
            ${tabBtn('picks', "Today's Picks")}
            ${tabBtn('records', 'Full Record')}
          </div>
          <!-- Content -->
          <div style="animation:fadeUp 0.4s ease">
            ${activeTab === 'picks' ? picksContent : recordsContent}
          </div>
          <!-- Footer -->
          <div style="text-align:center;padding:20px 0 32px;border-top:1px solid rgba(255,255,255,0.04)">
            <div style="font-size:11px;color:rgba(255,255,255,0.2)">Model-generated picks · Not financial advice · Gamble responsibly</div>
          </div>
        </div>`;
    }

    loadData();
  </script>
</body>
</html>
